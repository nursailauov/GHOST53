<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghost Control Panel</title>
  <style>
    :root {
      --bg: #080b14;
      --card: #11172a;
      --line: #27314d;
      --text: #eef2ff;
      --muted: #9aa7c6;
      --accent: #ff2f59;
      --ok: #4ade80;
      --err: #ff7a7a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #141d37, var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .card {
      background: linear-gradient(180deg, #141b31, var(--card));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
    }
    h1, h2 { margin: 0 0 10px; }
    h1 { font-size: 1.4rem; }
    h2 { font-size: 1rem; color: var(--accent); }
    .muted { color: var(--muted); font-size: .92rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    input, textarea, select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0f1527;
      color: var(--text);
      padding: 11px;
      font: inherit;
    }
    textarea { min-height: 84px; resize: vertical; }
    button {
      background: linear-gradient(90deg, #ff2f59, #d61a68);
      border: 0;
      font-weight: 700;
      cursor: pointer;
    }
    .row { display: grid; gap: 10px; }
    .status { min-height: 18px; font-size: .92rem; }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0c1222;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      max-height: 360px;
      overflow: auto;
    }
    .clients { display:flex; flex-wrap: wrap; gap:8px; margin-top: 8px; }
    .client { background:#0d1425; border:1px solid var(--line); border-radius: 99px; padding:4px 10px; font-size:.85rem; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Ghost Control Panel</h1>
      <p class="muted">Удобная панель для <code>/ghost</code>, <code>/ghost_all</code> и просмотра аккаунтов.</p>
    </section>

    <section class="card row">
      <h2>Запуск Ghost</h2>
      <div class="grid">
        <div>
          <label for="teamcode">Teamcode</label>
          <input id="teamcode" placeholder="например: 123456789" />
        </div>
        <div>
          <label for="mode">Режим</label>
          <select id="mode">
            <option value="all">Все аккаунты (/ghost_all)</option>
            <option value="single">Один аккаунт (/ghost)</option>
          </select>
        </div>
      </div>

      <div>
        <label for="names">Имена ghost (по одному в строке или через запятую)</label>
        <textarea id="names" placeholder="Ghost1\nGhost2\nGhost3"></textarea>
      </div>

      <button id="runBtn" type="button">Отправить</button>
      <div id="status" class="status muted">Готово к отправке.</div>
    </section>

    <section class="card row">
      <h2>Аккаунты в памяти</h2>
      <button id="refreshClients" type="button">Обновить список аккаунтов</button>
      <div id="clients" class="clients"></div>
    </section>

    <section class="card row">
      <h2>Ответ API</h2>
      <pre id="output">{}</pre>
    </section>
  </main>

  <script>
    const teamcodeEl = document.getElementById('teamcode');
    const namesEl = document.getElementById('names');
    const modeEl = document.getElementById('mode');
    const runBtn = document.getElementById('runBtn');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const clientsEl = document.getElementById('clients');
    const refreshBtn = document.getElementById('refreshClients');

    function setStatus(msg, type = 'muted') {
      statusEl.textContent = msg;
      statusEl.className = `status ${type}`;
    }

    function normalizeNames() {
      return namesEl.value
        .split(/[\n,]/)
        .map(v => v.trim())
        .filter(Boolean)
        .join(',');
    }

    async function refreshClients() {
      try {
        const resp = await fetch('/list_clients');
        const data = await resp.json();
        clientsEl.innerHTML = '';
        (data.clients || []).forEach(id => {
          const item = document.createElement('span');
          item.className = 'client';
          item.textContent = id;
          clientsEl.appendChild(item);
        });
        if (!clientsEl.children.length) {
          clientsEl.innerHTML = '<span class="muted">Нет загруженных клиентов.</span>';
        }
      } catch (e) {
        clientsEl.innerHTML = '<span class="err">Ошибка загрузки клиентов</span>';
      }
    }

    async function runGhost() {
      const teamcode = teamcodeEl.value.trim();
      if (!teamcode) {
        setStatus('Введите teamcode.', 'err');
        return;
      }

      const names = normalizeNames();
      const isAll = modeEl.value === 'all';
      const base = isAll ? '/ghost_all' : '/ghost';
      const params = new URLSearchParams({ teamcode });

      if (names) {
        if (isAll) {
          params.set('ghost_names', names);
        } else {
          params.set('ghost_name', names.split(',')[0]);
        }
      }

      setStatus('Отправка запроса...', 'muted');
      outputEl.textContent = '{}';

      try {
        const resp = await fetch(`${base}?${params.toString()}`);
        const data = await resp.json();
        outputEl.textContent = JSON.stringify(data, null, 2);

        if (!resp.ok) {
          setStatus(`Ошибка: HTTP ${resp.status}`, 'err');
          return;
        }

        setStatus('Успешно отправлено.', 'ok');
        await refreshClients();
      } catch (e) {
        outputEl.textContent = String(e);
        setStatus('Ошибка сети или JSON.', 'err');
      }
    }

    runBtn.addEventListener('click', runGhost);
    refreshBtn.addEventListener('click', refreshClients);
    refreshClients();
  </script>
</body>
</html>
